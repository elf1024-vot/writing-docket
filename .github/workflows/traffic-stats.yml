name: Traffic stats

# Snapshots repo traffic weekly and appends it to traffic/stats.csv, so you keep
# a running history (GitHub's own Insights > Traffic only retains the last 14 days).
# Also records cumulative release-asset downloads.
#
# Auth note: the traffic API requires push access. The default GITHUB_TOKEN usually
# works for a repo's own traffic; if a run 403s on the traffic endpoints, create a
# Personal Access Token with "repo" scope and add it as a repo secret named
# TRAFFIC_TOKEN - this workflow will prefer it automatically.

on:
  schedule:
    - cron: "17 6 * * 1"   # every Monday 06:17 UTC
  workflow_dispatch: {}     # lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and append traffic
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          mkdir -p traffic
          day=$(date -u +%F)
          clones=$(gh api "repos/$REPO/traffic/clones" --jq '.count // 0')
          uclones=$(gh api "repos/$REPO/traffic/clones" --jq '.uniques // 0')
          views=$(gh api "repos/$REPO/traffic/views" --jq '.count // 0')
          uviews=$(gh api "repos/$REPO/traffic/views" --jq '.uniques // 0')
          downloads=$(gh api "repos/$REPO/releases" --jq '[.[].assets[].download_count] | add // 0')

          file=traffic/stats.csv
          if [ ! -f "$file" ]; then
            echo "date,clones_14d,unique_cloners_14d,views_14d,unique_visitors_14d,release_downloads_total" > "$file"
          fi
          echo "$day,$clones,$uclones,$views,$uviews,$downloads" >> "$file"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git diff --cached --quiet || git commit -m "traffic snapshot $day"
          git push
