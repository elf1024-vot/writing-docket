<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - {{PROJECT_NAME}}</title>
  <link rel="stylesheet" href="docket.css">
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="index.html">{{PROJECT_NAME}}</a>
  <a href="index.html">Home</a>
  <a href="character-editor.html">Characters</a>
  <a href="chapter-editor.html">Chapters</a>
  <a href="location-editor.html">Locations</a>
  <a href="notes-editor.html" class="active">Notes</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="chapter-tracker.html">Tracker</a>
  <a href="readme.html">README</a>
  <a href="faq.html">FAQ</a>
</nav>

<header class="page-header">
  <h1>NOTES</h1>
  <span class="subtitle">open questions &amp; revisions</span>
</header>
<div id="status">Loading…</div>

<main class="content">

  <section class="section">
    <div class="section-title">New Note</div>
    <h2>Create</h2>
    <div class="panel">
      <form id="note-form" onsubmit="return false;">
        <div class="form-grid">
          <div class="field"><label>Scope</label>
            <select id="f-scope" onchange="updateContext()">
              <option value="project">project</option><option value="book">book</option>
              <option value="chapter">chapter</option><option value="character">character</option>
              <option value="location">location</option><option value="group">group</option>
            </select></div>
          <div class="field"><label>Priority</label>
            <select id="f-priority"><option value="HIGH">HIGH</option><option value="MED">MED</option><option value="LOW">LOW</option></select></div>
          <!-- contextual FK fields, shown per scope -->
          <div class="field ctx ctx-book ctx-chapter"><label>Book</label><input id="f-book" value="{{BOOK_NAME}}"></div>
          <div class="field ctx ctx-chapter"><label>Chapter</label><input id="f-chapter" type="number"></div>
          <div class="field ctx ctx-chapter"><label>Part</label><input id="f-part" type="number"></div>
          <div class="field ctx ctx-character"><label>Character</label><select id="f-character_name"></select></div>
          <div class="field ctx ctx-location"><label>Location</label><select id="f-location_id"></select></div>
          <div class="field ctx ctx-group"><label>Group ID</label><input id="f-group_id"></div>
          <div class="field full"><label>Body</label><textarea id="f-body"></textarea></div>
        </div>
        <div class="toolbar"><button class="primary" onclick="createNote()">Add Note</button><button onclick="document.getElementById('note-form').reset();updateContext();">Clear</button></div>
      </form>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Open Notes</div>
    <h2>Outstanding</h2>
    <div class="toolbar">
      <label class="td-muted">Priority</label>
      <select id="filter-priority" onchange="render()">
        <option value="">all</option><option value="HIGH">HIGH</option><option value="MED">MED</option><option value="LOW">LOW</option>
      </select>
      <label class="td-muted">Scope</label>
      <select id="filter-scope" onchange="render()">
        <option value="">all</option><option value="project">project</option><option value="book">book</option>
        <option value="chapter">chapter</option><option value="character">character</option>
        <option value="location">location</option><option value="group">group</option>
      </select>
    </div>
    <div id="notes-list"></div>
  </section>

</main>

<script>
const API = '/api/notes';
let openNotes = [];

function status(msg, cls){ const s = document.getElementById('status'); s.textContent = msg; s.className = cls || ''; }
function val(id){ return document.getElementById(id).value.trim(); }
async function j(p){ const r = await fetch(p); return r.ok ? await r.json() : []; }

function updateContext(){
  const scope = document.getElementById('f-scope').value;
  document.querySelectorAll('.ctx').forEach(el => { el.style.display = el.classList.contains('ctx-' + scope) ? '' : 'none'; });
}

async function loadDropdowns(){
  const [chars, locs] = await Promise.all([
    j('/api/characters?select=name,display_name&order=name'),
    j('/api/locations?select=location_id,display_name&order=display_name')
  ]);
  document.getElementById('f-character_name').innerHTML =
    '<option value=""></option>' + chars.map(c => `<option value="${c.name}">${c.display_name || c.name}</option>`).join('');
  document.getElementById('f-location_id').innerHTML =
    '<option value=""></option>' + locs.map(l => `<option value="${l.location_id}">${l.display_name || l.location_id}</option>`).join('');
}

function payload(){
  const scope = val('f-scope');
  const p = { scope, priority: val('f-priority'), status: 'open', body: val('f-body') || null };
  if (scope === 'book' || scope === 'chapter') p.book = val('f-book') || null;
  if (scope === 'chapter'){ p.chapter = val('f-chapter') ? +val('f-chapter') : null; p.part = val('f-part') ? +val('f-part') : null; }
  if (scope === 'character') p.character_name = val('f-character_name') || null;
  if (scope === 'location') p.location_id = val('f-location_id') || null;
  if (scope === 'group') p.group_id = val('f-group_id') || null;
  return p;
}

async function createNote(){
  if (!val('f-body')){ status('Body is required', 'error'); return; }
  const r = await fetch(API, {
    method: 'POST', headers: {'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(payload()) });
  if (!r.ok){ status('Create failed: ' + (await r.text()), 'error'); return; }
  status('Note added', 'success');
  document.getElementById('f-body').value = '';
  await load();
}

async function resolveNote(id){
  const r = await fetch(API + '?note_id=eq.' + id, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: 'resolved' }) });
  if (!r.ok){ status('Resolve failed: ' + (await r.text()), 'error'); return; }
  status('Resolved note ' + id, 'success');
  await load();
}

function contextLabel(n){
  if (n.scope === 'chapter') return `${n.book||''} Ch ${n.chapter||'?'}${n.part?'.'+n.part:''}`;
  if (n.scope === 'book') return n.book || '';
  if (n.scope === 'character') return n.character_name || '';
  if (n.scope === 'location') return n.location_id || '';
  if (n.scope === 'group') return n.group_id || '';
  return 'project-wide';
}

function render(){
  const fp = document.getElementById('filter-priority').value;
  const fs = document.getElementById('filter-scope').value;
  const rows = openNotes.filter(n => (!fp || n.priority === fp) && (!fs || n.scope === fs));
  const sev = { HIGH:'crit', MED:'warn', LOW:'muted' };
  document.getElementById('notes-list').innerHTML = rows.map(n => `
    <div class="callout ${n.priority==='HIGH'?'danger':'info'} ${n.priority==='HIGH'?'note-high':''}" style="display:flex;gap:14px;align-items:flex-start;">
      <span class="badge badge-${sev[n.priority]}">${n.priority}</span>
      <span class="badge badge-muted">${n.scope}</span>
      <span style="flex:1;">${(n.body||'').replace(/</g,'&lt;')}<br><span class="td-muted">${contextLabel(n)}</span></span>
      <button onclick="resolveNote(${n.note_id})">Resolve</button>
    </div>`).join('') || '<p class="td-muted">No open notes match.</p>';
}

async function load(){
  try {
    openNotes = await j(API + '?status=eq.open&select=*&order=priority.asc,created_at.desc');
    status(openNotes.length + ' open notes', 'success');
    render();
  } catch(e){ status('Error loading: ' + e.message, 'error'); }
}

(async () => { await loadDropdowns(); updateContext(); await load(); })();
</script>
</body>
</html>
